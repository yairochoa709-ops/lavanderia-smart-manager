# ==========================================
# Configuración del Servidor
# ==========================================
server.port=8080

# ==========================================
# Configuración de Base de Datos PostgreSQL
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/lavanderia_guayaquil?currentSchema=gestion_procesos
spring.datasource.username=postgres
spring.datasource.password=071720
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# Configuración JPA / Hibernate
# ==========================================
# 'update' mantiene seguras las tablas existentes y solo crea/actualiza nuevas columnas o tablas
spring.jpa.hibernate.ddl-auto=update

# Muestra y formatea las consultas SQL en la consola (útil para depuración)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
